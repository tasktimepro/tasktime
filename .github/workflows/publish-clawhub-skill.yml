name: Publish TaskTime Pro Skill to ClawHub

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate the exact ClawHub release without publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@v1
    with:
      owner: tasktimepro
      skill_path: integrations/openclaw/tasktime/skills/tasktime
      dry_run: ${{ inputs.dry_run }}
      ref: ${{ github.sha }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}

  verify:
    needs: publish
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify official ClawHub identity and provenance
        env:
          VERIFY_PATH: ${{ runner.temp }}/clawhub-verify.json
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            npx -y clawhub@0.23.1 skill verify @tasktimepro/tasktime-agent > "$VERIFY_PATH" || true

            if node -e '
              const fs = require("node:fs");
              const result = JSON.parse(fs.readFileSync(process.env.VERIFY_PATH, "utf8"));
              const valid = result.ok === true
                && result.publisherHandle === "tasktimepro"
                && result.card?.available === true
                && result.provenance?.source === "server-resolved-github-import";
              process.exit(valid ? 0 : 1);
            '; then
              echo "ClawHub verified the canonical publisher, Skill Card, and GitHub provenance."
              exit 0
            fi

            if [[ "$attempt" -lt 30 ]]; then
              sleep 10
            fi
          done

          echo "ClawHub publication completed, but post-publish verification is incomplete:" >&2
          cat "$VERIFY_PATH" >&2
          echo "Do not republish this version; follow the verification procedure in docs/agent-release-runbook.md." >&2
          exit 1
