name: Publish MCP Registry

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl --fail --location --retry 3 \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Validate server manifest
        run: ./mcp-publisher validate agent-bridge/server.json

      - name: Login with TaskTime domain proof
        run: |
          ./mcp-publisher login http \
            --domain tasktime.pro \
            --algorithm ecdsap384 \
            --private-key "$MCP_REGISTRY_PRIVATE_KEY"
        env:
          MCP_REGISTRY_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}

      - name: Publish server manifest
        run: ./mcp-publisher publish agent-bridge/server.json
